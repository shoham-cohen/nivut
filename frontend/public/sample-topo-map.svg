<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200">
  <!-- Sample white topographic map. Replace with a real topo image when available. -->
  <rect width="1600" height="1200" fill="#fbfaf6" />

  <!-- Faint grid -->
  <g stroke="#e6e2d3" stroke-width="1">
    <path d="M0 100 H1600 M0 200 H1600 M0 300 H1600 M0 400 H1600 M0 500 H1600 M0 600 H1600 M0 700 H1600 M0 800 H1600 M0 900 H1600 M0 1000 H1600 M0 1100 H1600" />
    <path d="M100 0 V1200 M200 0 V1200 M300 0 V1200 M400 0 V1200 M500 0 V1200 M600 0 V1200 M700 0 V1200 M800 0 V1200 M900 0 V1200 M1000 0 V1200 M1100 0 V1200 M1200 0 V1200 M1300 0 V1200 M1400 0 V1200 M1500 0 V1200" />
  </g>

  <!-- Contour lines (concentric hills) -->
  <g fill="none" stroke="#b08968" stroke-width="2">
    <ellipse cx="430" cy="360" rx="260" ry="200" />
    <ellipse cx="430" cy="360" rx="205" ry="155" />
    <ellipse cx="430" cy="360" rx="150" ry="112" />
    <ellipse cx="430" cy="360" rx="95"  ry="70" />
    <ellipse cx="430" cy="360" rx="45"  ry="32" />

    <ellipse cx="1150" cy="820" rx="300" ry="230" />
    <ellipse cx="1150" cy="820" rx="235" ry="178" />
    <ellipse cx="1150" cy="820" rx="170" ry="128" />
    <ellipse cx="1150" cy="820" rx="108" ry="80" />
    <ellipse cx="1150" cy="820" rx="50"  ry="36" />
  </g>

  <!-- Index contour (bold) -->
  <g fill="none" stroke="#8c5a3c" stroke-width="3">
    <ellipse cx="430" cy="360" rx="260" ry="200" />
    <ellipse cx="1150" cy="820" rx="300" ry="230" />
  </g>

  <!-- River -->
  <path d="M0 950 C 250 880, 380 1050, 620 980 S 980 760, 1200 880 S 1480 980, 1600 900"
        fill="none" stroke="#7fb2d4" stroke-width="6" stroke-linecap="round" />

  <!-- Trail (dashed) -->
  <path d="M120 180 C 360 260, 520 520, 760 520 S 1080 300, 1320 460"
        fill="none" stroke="#666" stroke-width="3" stroke-dasharray="12 10" />

  <!-- Spot heights -->
  <g fill="#8c5a3c" font-family="sans-serif" font-size="22">
    <circle cx="430" cy="360" r="4" />
    <text x="446" y="356">▲ 612</text>
    <circle cx="1150" cy="820" r="4" />
    <text x="1166" y="816">▲ 845</text>
  </g>

  <text x="40" y="60" fill="#9a9684" font-family="sans-serif" font-size="28">SAMPLE TOPOGRAPHIC MAP</text>
</svg>
